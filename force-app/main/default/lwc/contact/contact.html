<template>

    <section class="contact-page">

        <!-- HERO -->

        <div class="hero-section">

            <p class="mini-title">
                CONTACT KLOD
            </p>

            <h1>
                Let’s Talk About Your CRM
            </h1>

            <p class="hero-description">

                Ask questions, request a consultation
                or contact our team about Salesforce solutions.

            </p>

        </div>

        <!-- MAIN GRID -->

        <div class="contact-grid">

            <!-- LEFT -->

            <div class="contact-form-card">

                <h2>
                    Send Us A Message
                </h2>

                <div class="input-grid">

                    <input
                        type="text"
                        placeholder="Full Name"
                        value={fullName}
                        onchange={handleFullName}>

                    <input
                        type="email"
                        placeholder="Email Address"
                        value={email}
                        onchange={handleEmail}>

                    <input
                        type="text"
                        placeholder="Company Name"
                        value={company}
                        onchange={handleCompany}>

                    <select onchange={handleTopic}>

                        <option value="">
                            Select Topic
                        </option>

                        <option value="CRM Setup">
                            CRM Setup
                        </option>

                        <option value="Salesforce Services">
                            Salesforce Services
                        </option>

                        <option value="Automation">
                            Automation
                        </option>

                        <option value="Support">
                            Support
                        </option>

                        <option value="Partnership">
                            Partnership
                        </option>

                    </select>

                </div>

                <textarea
                    placeholder="Write your message..."
                    onchange={handleMessage}>
                </textarea>

                <!-- CONSENT -->

                <div class="consent-section">

                    <div class="checkbox-item">

                        <input
                            id="terms"
                            class="custom-checkbox"
                            type="checkbox"
                            checked={termsAccepted}
                            onchange={handleTermsConsent}>

                        <label for="terms">

                            <span class="required-star">*</span>

                            I accept the Privacy Policy and Terms of Service.

                        </label>

                    </div>

                    <div class="checkbox-item">

                        <input
                            id="marketing"
                            class="custom-checkbox"
                            type="checkbox"
                            checked={marketingConsent}
                            onchange={handleMarketingConsent}>

                        <label for="marketing">

                            I agree to receive emails,
                            SMS updates and promotions.

                        </label>

                    </div>

                </div>

                <!-- BUTTON -->

                <template if:true={termsAccepted}>

                    <button
                        class="submit-btn"
                        onclick={handleSubmit}>

                        Send Message

                    </button>

                </template>

                <template if:false={termsAccepted}>

                    <button
                        class="submit-btn disabled-btn">

                        Send Message

                    </button>

                </template>

            </div>

            <!-- RIGHT -->

            <div class="contact-sidebar">

                <!-- CONTACT INFO -->

                <div class="sidebar-card">

                    <p class="sidebar-mini">
                        CONTACT INFORMATION
                    </p>

                    <h2>
                        Reach Our Team
                    </h2>

                    <div class="info-item">

                        <span class="info-icon">
                            ✉️
                        </span>

                        <div>

                            <h3>
                                Email
                            </h3>

                            <p>
                                hello@klodcrm.com
                            </p>

                        </div>

                    </div>

                    <div class="info-item">

                        <span class="info-icon">
                            📞
                        </span>

                        <div>

                            <h3>
                                Phone
                            </h3>

                            <p>
                                +47 000 00 000
                            </p>

                        </div>

                    </div>

                    <div class="info-item">

                        <span class="info-icon">
                            📍
                        </span>

                        <div>

                            <h3>
                                Location
                            </h3>

                            <p>
                                Norway
                            </p>

                        </div>

                    </div>

                </div>

                <!-- RESPONSE -->

                <div class="sidebar-card">

                    <p class="sidebar-mini">
                        RESPONSE TIME
                    </p>

                    <h2>
                        Fast Communication
                    </h2>

                    <p class="sidebar-text">

                        Most requests are answered
                        within one business day.

                    </p>

                    <div class="response-status">

                        <div class="status-dot"></div>

                        <span>
                            Support Team Online
                        </span>

                    </div>

                </div>

                <!-- SERVICES -->

                <div class="sidebar-card">

                    <p class="sidebar-mini">
                        SERVICES
                    </p>

                    <h2>
                        We Can Help With
                    </h2>

                    <div class="service-list">

                        <div class="service-item">
                            Salesforce CRM
                        </div>

                        <div class="service-item">
                            Automation
                        </div>

                        <div class="service-item">
                            Email Campaigns
                        </div>

                        <div class="service-item">
                            SMS Notifications
                        </div>

                        <div class="service-item">
                            Customer Portals
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</template>

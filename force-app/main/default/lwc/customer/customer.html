<template>

    <section class="service-page">

        <!-- HERO -->

        <div class="hero-section">

            <div class="hero-left">

                <p class="mini-title">
                    CUSTOMER MANAGEMENT
                </p>

                <h1>
                    Never Forget A Customer
                </h1>

                <p class="hero-description">
                    Keep track of every customer interaction,
                    follow-up task, and sales opportunity from one simple system.
                    Designed for small businesses that want stronger customer relationships
                    without extra complexity.
                </p>

                <div class="hero-buttons">

                    <button class="primary-btn" onclick={handleNavigation} data-id="booking">
                        Book Free Consultation
                    </button>

                  
                </div>

            </div>

            <div class="hero-right">

                 <template if:true={hasImage}>
                    <img src={heroImage} alt="CRM Dashboard" />
                </template>
            </div>

        </div>

        <!-- BENEFITS -->

        <section class="benefits-section">

            <div class="benefit-card">

                <lightning-icon
                    icon-name="utility:people"
                    size="small">
                </lightning-icon>

                <h3>Keep Every Customer Organized</h3>

                <p>
                    Store customer information in one secure place.
                </p>

            </div>

            <div class="benefit-card">

                <lightning-icon
                    icon-name="utility:task"
                    size="small">
                </lightning-icon>

                <h3>Never Miss A Follow-Up</h3>

                <p>
                    Automatic reminders for calls, meetings, and tasks.
                </p>

            </div>

            <div class="benefit-card">

                <lightning-icon
                    icon-name="utility:favorite"
                    size="small">
                </lightning-icon>

                <h3>Improve Customer Relationships</h3>

                <p>
                    Track communication history and customer needs.
                </p>

            </div>

        </section>

        <!-- HOW IT WORKS -->

        <section class="steps-section">

            <div class="section-header">

                <p class="mini-title">
                    HOW IT WORKS
                </p>

                <h2>
                    Simple Customer Tracking
                </h2>

            </div>

            <div class="steps-grid">

                <div class="step-card">

                    <span>01</span>

                    <h3>Add Your Customers</h3>

                    <p>
                        Import or create customer records easily.
                    </p>

                </div>

                <div class="step-card">

                    <span>02</span>

                    <h3>Create Follow-Up Tasks</h3>

                    <p>
                        Schedule reminders and customer activities.
                    </p>

                </div>

                <div class="step-card">

                    <span>03</span>

                    <h3>Track Every Interaction</h3>

                    <p>
                        Keep communication and sales history organized.
                    </p>

                </div>

            </div>

        </section>

        <!-- FEATURES -->

        <section class="features-section">

            <div class="section-header">

                <p class="mini-title">
                    FEATURES
                </p>

                <h2>
                    Simple Customer Relationship Management
                </h2>

            </div>

            <div class="features-grid">

                <div class="feature-item">
                    ✔ Customer Profiles
                </div>

                <div class="feature-item">
                    ✔ Task Reminders
                </div>

                <div class="feature-item">
                    ✔ Call & Meeting Tracking
                </div>

                <div class="feature-item">
                    ✔ Sales Opportunity Tracking
                </div>

                <div class="feature-item">
                    ✔ Notes & Activity History
                </div>

                <div class="feature-item">
                    ✔ Mobile Access
                </div>

            </div>

        </section>

        <!-- PRICING -->

        <section class="pricing-section">

            <p class="mini-title">
                STARTING PRICE
            </p>

            <h2>
                From €69 / month
            </h2>

            <p>
                Salesforce licensing may apply depending on users
                and selected customer management features.
            </p>

        </section>

        <!-- CTA -->

        <section class="cta-section">

            <h2>
                Ready To Build Better Customer Relationships?
            </h2>

            <p>
                Keep every customer interaction organized
                from one simple platform.
            </p>

            <button class="primary-btn" onclick={handleNavigation} data-id="booking">
                Book Free Consultation
            </button>

        </section>

    </section>

</template>

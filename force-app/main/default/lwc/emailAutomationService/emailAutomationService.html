<template>

    <section class="service-page">

        <!-- HERO -->

        <div class="hero-section">

            <div class="hero-left">

                <p class="mini-title">
                    EMAIL AUTOMATION
                </p>

                <h1>
                    Send Campaigns To All Customers In Seconds
                </h1>

                <p class="hero-description">
                    Easily send promotions, updates, reminders,
                    and offers to your customers from one simple dashboard.
                    Designed for small businesses that want to save time
                    and increase customer engagement.
                </p>

                <div class="hero-buttons">
                    <button class="primary-btn" onclick={handleNavigation} data-id="booking">
                        Book Free Consultation
                    </button>

                   
                </div>

            </div>

            <div class="hero-right">

                <template if:true={hasImage}>
                    <img src={heroImage} alt="CRM Dashboard" />
                </template>

            </div>

        </div>

        <!-- BENEFITS -->

        <section class="benefits-section">

            <div class="benefit-card">
                <lightning-icon
                    icon-name="utility:clock"
                    size="small">
                </lightning-icon>

                <h3>Save Time</h3>

                <p>
                    Send campaigns and reminders instantly.
                </p>
            </div>

            <div class="benefit-card">
                <lightning-icon
                    icon-name="utility:email"
                    size="small">
                </lightning-icon>

                <h3>Automate Communication</h3>

                <p>
                    Keep customers informed automatically.
                </p>
            </div>

            <div class="benefit-card">
                <lightning-icon
                    icon-name="utility:chart"
                    size="small">
                </lightning-icon>

                <h3>Track Campaign Results</h3>

                <p>
                    Monitor opens, clicks, and customer engagement.
                </p>
            </div>

        </section>

        <!-- HOW IT WORKS -->

        <section class="steps-section">

            <div class="section-header">
                <p class="mini-title">
                    HOW IT WORKS
                </p>

                <h2>
                    Simple Setup Process
                </h2>
            </div>

            <div class="steps-grid">

                <div class="step-card">
                    <span>01</span>

                    <h3>Import Your Customers</h3>

                    <p>
                        Easily upload customer lists into your CRM.
                    </p>
                </div>

                <div class="step-card">
                    <span>02</span>

                    <h3>Create Email Campaigns</h3>

                    <p>
                        Use simple templates for promotions and updates.
                    </p>
                </div>

                <div class="step-card">
                    <span>03</span>

                    <h3>Track Results</h3>

                    <p>
                        Monitor customer engagement in real time.
                    </p>
                </div>

            </div>

        </section>

        <!-- FEATURES -->

        <section class="features-section">

            <div class="section-header">
                <p class="mini-title">
                    FEATURES
                </p>

                <h2>
                    Everything You Need
                </h2>
            </div>

            <div class="features-grid">

                <div class="feature-item">
                    ✔ Bulk Email Campaigns
                </div>

                <div class="feature-item">
                    ✔ Campaign Scheduling
                </div>

                <div class="feature-item">
                    ✔ Customer Segmentation
                </div>

                <div class="feature-item">
                    ✔ Email Templates
                </div>

                <div class="feature-item">
                    ✔ Mobile Access
                </div>

                <div class="feature-item">
                    ✔ Reporting Dashboard
                </div>

            </div>

        </section>

        <!-- PRICING -->

        <section class="pricing-section">

            <p class="mini-title">
                STARTING PRICE
            </p>

            <h2>
                From €49 / month
            </h2>

            <p>
                Salesforce licensing may apply depending on users
                and selected features.
            </p>

        </section>

        <!-- CTA -->

        <section class="cta-section">

            <h2>
                Ready To Simplify Your Customer Communication?
            </h2>

            <p>
                No technical knowledge required.
                We simplify Salesforce for small businesses.
            </p>

            <button class="primary-btn" onclick={handleNavigation} data-id="booking">
                Book Free Consultation
            </button>

        </section>

    </section>

</template>

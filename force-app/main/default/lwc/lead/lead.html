<template>

    <section class="service-page">

        <!-- HERO -->

        <div class="hero-section">

            <div class="hero-left">

                <p class="mini-title">
                    LEAD MANAGEMENT
                </p>

                <h1>
                    Collect Customers From Your Website
                </h1>

                <p class="hero-description">
                    Turn website visitors into real customers with smart forms,
                    automated lead collection, and instant follow-up tracking.
                    Perfect for small businesses that want more customer inquiries
                    without manual work.
                </p>

                <div class="hero-buttons">

                    <button class="primary-btn" onclick={handleNavigation} data-id="booking">
                        Book Free Consultation
                    </button>

                  
                </div>

            </div>

            <div class="hero-right">

                <template if:true={hasImage}>
                    <img src={heroImage} alt="CRM Dashboard" />
                </template>

            </div>

        </div>

        <!-- BENEFITS -->

        <section class="benefits-section">

            <div class="benefit-card">

                <lightning-icon
                    icon-name="utility:world"
                    size="small">
                </lightning-icon>

                <h3>Capture Website Leads</h3>

                <p>
                    Automatically collect customer requests from your website.
                </p>

            </div>

            <div class="benefit-card">

                <lightning-icon
                    icon-name="utility:user"
                    size="small">
                </lightning-icon>

                <h3>Create Customers Instantly</h3>

                <p>
                    Turn website visitors into organized customer records.
                </p>

            </div>

            <div class="benefit-card">

                <lightning-icon
                    icon-name="utility:task"
                    size="small">
                </lightning-icon>

                <h3>Follow Up Faster</h3>

                <p>
                    Receive instant notifications for new inquiries.
                </p>

            </div>

        </section>

        <!-- HOW IT WORKS -->

        <section class="steps-section">

            <div class="section-header">

                <p class="mini-title">
                    HOW IT WORKS
                </p>

                <h2>
                    Simple Lead Collection Process
                </h2>

            </div>

            <div class="steps-grid">

                <div class="step-card">

                    <span>01</span>

                    <h3>Add Forms To Your Website</h3>

                    <p>
                        Connect contact forms directly to your CRM system.
                    </p>

                </div>

                <div class="step-card">

                    <span>02</span>

                    <h3>Capture Customer Requests</h3>

                    <p>
                        Automatically collect inquiries and contact details.
                    </p>

                </div>

                <div class="step-card">

                    <span>03</span>

                    <h3>Track Every Lead</h3>

                    <p>
                        Manage and follow up on every opportunity easily.
                    </p>

                </div>

            </div>

        </section>

        <!-- FEATURES -->

        <section class="features-section">

            <div class="section-header">

                <p class="mini-title">
                    FEATURES
                </p>

                <h2>
                    Smart Website Lead Management
                </h2>

            </div>

            <div class="features-grid">

                <div class="feature-item">
                    ✔ Website Contact Forms
                </div>

                <div class="feature-item">
                    ✔ Automatic Lead Creation
                </div>

                <div class="feature-item">
                    ✔ Instant Notifications
                </div>

                <div class="feature-item">
                    ✔ Lead Assignment
                </div>

                <div class="feature-item">
                    ✔ Customer Follow-Up Tracking
                </div>

                <div class="feature-item">
                    ✔ Mobile Access
                </div>

            </div>

        </section>

        <!-- PRICING -->

        <section class="pricing-section">

            <p class="mini-title">
                STARTING PRICE
            </p>

            <h2>
                From €89 / month
            </h2>

            <p>
                Salesforce licensing and website integration costs
                may apply depending on business requirements.
            </p>

        </section>

        <!-- CTA -->

        <section class="cta-section">

            <h2>
                Ready To Turn Website Visitors Into Customers?
            </h2>

            <p>
                Automate lead collection and simplify customer follow-ups.
            </p>

            <button class="primary-btn" onclick={handleNavigation} data-id="booking">
                Book Free Consultation
            </button>

        </section>

    </section>

</template>

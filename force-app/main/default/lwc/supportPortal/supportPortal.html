<template>

    <section class="support-page">

        <!-- HERO -->

        <div class="hero-section">

            <p class="mini-title">
                CUSTOMER SUPPORT
            </p>

            <h1>
                How Can We Help You?
            </h1>

            <p class="hero-description">
                Get support, ask questions, report issues,
                or talk with our CRM experts.
            </p>

        </div>

        <!-- TOP ACTIONS -->

        <div class="top-actions">

            <div class="action-card">

                <div class="icon-circle">
                    💬
                </div>

                <h2>
                    Ask A Question
                </h2>

                <p>
                    Need help understanding a feature
                    or setting up your CRM?
                </p>

            </div>

            <div class="action-card">

                <div class="icon-circle">
                    🛠️
                </div>

                <h2>
                    Report A Problem
                </h2>

                <p>
                    Having technical issues?
                    Let us know and we will help.
                </p>

            </div>

            <div class="action-card">

                <div class="icon-circle">
                    🤖
                </div>

                <h2>
                    AI Assistant
                </h2>

                <p>
                    Agentforce-ready support structure
                    for instant customer help.
                </p>

            </div>

        </div>

        <!-- MAIN GRID -->

        <div class="support-grid">

            <!-- LEFT -->

            <div class="support-form-card">

                <!-- FORM -->

                <template if:false={isSubmittedSuccessfully}>

                    <h2>
                        Create Support Request
                    </h2>

                    <div class="input-grid">

                        <input
                            type="text"
                            placeholder="Full Name"
                            value={fullName}
                            oninput={handleFullName}>

                        <input
                            data-id="supportEmailField"
                            type="email"
                            required
                            pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$"
                            placeholder="Email Address"
                            value={email}
                            oninput={handleEmail}>

                        <input
                            type="text"
                            placeholder="Company Name"
                            value={company}
                            oninput={handleCompany}>

                        <select
                            onchange={handleCategory}>

                            <option value="">
                                Select Category
                            </option>

                            <option value="Technical Issue">
                                Technical Issue
                            </option>

                            <option value="CRM Setup">
                                CRM Setup
                            </option>

                            <option value="Email Campaign">
                                Email Campaign
                            </option>

                            <option value="SMS Support">
                                SMS Support
                            </option>

                            <option value="Billing">
                                Billing
                            </option>

                        </select>

                    </div>

                    <textarea
                        placeholder="Describe your issue or question..."
                        oninput={handleMessage}>
                    </textarea>

                    <!-- PRIORITY -->

                    <div class="priority-section">

                        <h3>
                            Priority
                        </h3>

                        <div class="priority-grid">

                            <div
                                class={lowClass}
                                data-value="Low"
                                onclick={handlePriority}>

                                Low

                            </div>

                            <div
                                class={mediumClass}
                                data-value="Medium"
                                onclick={handlePriority}>

                                Medium

                            </div>

                            <div
                                class={highClass}
                                data-value="High"
                                onclick={handlePriority}>

                                High

                            </div>

                        </div>

                    </div>

                    <!-- CONSENTS -->

                    <div class="consent-section">

                        <div class="checkbox-item">

                            <input
                                id="terms"
                                class="custom-checkbox"
                                type="checkbox"
                                checked={termsAccepted}
                                onchange={handleTermsConsent}>

                            <label for="terms">

                                <span class="required-star">*</span>

                                I accept the Privacy Policy and Terms of Service.

                            </label>

                        </div>

                        <div class="checkbox-item">

                            <input
                                id="marketing"
                                class="custom-checkbox"
                                type="checkbox"
                                checked={marketingConsent}
                                onchange={handleMarketingConsent}>

                            <label for="marketing">

                                I agree to receive emails,
                                SMS updates and promotions.

                            </label>

                        </div>

                    </div>

                    <!-- ERROR -->

                    <template if:true={submitErrorMessage}>

                        <div class="submit-error-box">

                            {submitErrorMessage}

                        </div>

                    </template>

                    <!-- BUTTON -->

                    <button
                        class="submit-btn"
                        onclick={handleSubmit}
                        disabled={isSubmitting}>

                        <template if:false={isSubmitting}>

                            Submit Request

                        </template>

                        <template if:true={isSubmitting}>

                            Submitting...

                        </template>

                    </button>

                </template>

                <!-- SUCCESS -->

                <template if:true={isSubmittedSuccessfully}>

                    <div class="success-box">

                        <h2>
                            Thank You!
                        </h2>

                        <p>
                            Your support request has been successfully submitted.
                        </p>

                        <p>
                            Our CRM specialists will review your request
                            and contact you shortly.
                        </p>

                    </div>

                </template>

            </div>

            <!-- RIGHT -->

            <div class="support-sidebar">

                <!-- AI -->

                <div class="sidebar-card">

                    <p class="sidebar-mini">
                        AGENTFORCE READY
                    </p>

                    <h2>
                        AI Support Assistant
                    </h2>

                    <p>
                        Future-ready architecture for
                        Salesforce Agentforce AI support.
                    </p>

                    <div class="ai-status">

                        <div class="status-dot"></div>

                        <span>
                            AI Structure Ready
                        </span>

                    </div>

                </div>

                <!-- FAQ -->

                <div class="sidebar-card">

                    <h2>
                        Popular Questions
                    </h2>

                    <div class="faq-item">

                        <h3>
                            How fast is setup?
                        </h3>

                        <p>
                            Most CRM systems are ready
                            within 2-10 business days.
                        </p>

                    </div>

                    <div class="faq-item">

                        <h3>
                            Do you support SMS?
                        </h3>

                        <p>
                            Yes. SMS and WhatsApp integrations are supported.
                        </p>

                    </div>

                    <div class="faq-item">

                        <h3>
                            Can you migrate data?
                        </h3>

                        <p>
                            Yes. We migrate Excel,
                            HubSpot and Salesforce data.
                        </p>

                    </div>

                </div>

                <!-- STATUS -->

                <div class="sidebar-card">

                    <h2>
                        Service Status
                    </h2>

                    <div class="status-item">

                        <span>
                            CRM Services
                        </span>

                        <span class="online">
                            Online
                        </span>

                    </div>

                    <div class="status-item">

                        <span>
                            SMS Services
                        </span>

                        <span class="online">
                            Online
                        </span>

                    </div>

                    <div class="status-item">

                        <span>
                            Email Services
                        </span>

                        <span class="online">
                            Online
                        </span>

                    </div>

                </div>

            </div>

        </div>

    </section>

</template>
